<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devka Beach Resort — Ops Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Load Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Floating Ambient Decorative Background Blobs -->
  <div class="aurora-bg aurora-1"></div>
  <div class="aurora-bg aurora-2"></div>

  <!-- ============ LOGIN SCREEN ============ -->
  <section id="loginScreen" class="login-screen">
    <div class="login-wrapper glass-panel">
      <!-- Left Panel: Resort Branding Banner -->
      <div class="login-banner">
        <div class="login-banner-overlay"></div>
        <div class="login-banner-content">
          <img src="logo.svg" alt="Devka Beach Resort Logo" class="banner-logo">
          <span class="banner-eyebrow">Devka Beach Resort</span>
          <h1 class="banner-title">Ops Hub</h1>
          <p class="banner-subtitle">Real-time collaboration and performance tracking for world-class hospitality operations.</p>
        </div>
      </div>
      <!-- Right Panel: Login Form Container -->
      <div class="login-form-container">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-subtitle">Sign in to access your operations dashboard.</p>
        
        <form id="loginForm">
          <div class="input-group">
            <label class="field-label" for="loginUsername">Username</label>
            <div class="input-wrapper">
              <i data-lucide="user" class="input-icon"></i>
              <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="username">
            </div>
          </div>

          <div class="input-group">
            <label class="field-label" for="loginPassword">Password</label>
            <div class="input-wrapper">
              <i data-lucide="lock" class="input-icon"></i>
              <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" id="togglePasswordBtn" class="btn-toggle-password" tabindex="-1">
                <i data-lucide="eye" class="toggle-password-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-gold btn-block">
            <i data-lucide="log-in"></i> Sign In
          </button>
        </form>
        <p class="login-footer">© 2026 Devka Beach Resort. All rights reserved.</p>
      </div>
    </div>
  </section>

  <!-- ============ APP SHELL TEMPLATE ============ -->
  <template id="appShellTemplate">
    <div id="appShell" class="app-shell hidden">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="logo.svg" alt="Devka Beach Resort Logo" class="sidebar-logo">
        <h2 class="brand-title">Ops Hub</h2>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </button>
        <button class="nav-item" data-view="tasks">
          <i data-lucide="check-square"></i> Tasks
        </button>
        <button class="nav-item" data-view="departments">
          <i data-lucide="layers"></i> Departments
        </button>
        <button class="nav-item admin-only hidden" data-view="users" id="navUsersBtn">
          <i data-lucide="users"></i> User Management
        </button>
      </nav>
      
      <button id="newTaskBtn" class="btn btn-gold btn-block">
        <i data-lucide="plus-circle"></i> New Task
      </button>
      
      <div class="sidebar-footer">
        <div class="user-chip">
          <span id="userInitial" class="avatar">A</span>
          <div>
            <p id="userName" class="user-name">—</p>
            <p id="userRole" class="user-role">—</p>
          </div>
        </div>
        <button id="logoutBtn" class="link-btn">
          <i data-lucide="log-out" style="width:14px;height:14px;"></i> Sign out
        </button>
      </div>
    </aside>

    <main class="main-content">
      
      <!-- Top header bar for operations status & notifications -->
      <div class="top-header">
        <div class="ops-status-badge" id="opsStatusBadge">
          <span class="pulse-dot"></span>
          <span id="opsStatusText">Operations Status: Normal</span>
        </div>
        
        <div class="notification-wrapper">
          <button id="notifBellBtn" class="btn-icon-only">
            <i data-lucide="bell"></i>
          </button>
          
          <!-- Notifications dropdown -->
          <div id="notifDropdown" class="notif-dropdown glass-panel hidden">
            <div class="notif-title">Recent Activity Logs</div>
            <div class="notif-list" id="notifList">
              <div class="notif-item">Welcome to Devka Ops Hub! Get started by monitoring active tasks.</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ---- Dashboard view ---- -->
      <section id="view-dashboard" class="view">
        <header class="view-header">
          <div>
            <p class="eyebrow">Overview</p>
            <h1 class="page-title">Operational Health</h1>
          </div>
        </header>

        <div class="stat-grid" id="statGrid"><!-- populated by app.js --></div>

        <div class="dashboard-layout">
          <!-- Left: Recent Tasks table -->
          <div class="panel glass-panel">
            <div class="panel-header">
              <h3>Recent Actions</h3>
            </div>
            <div class="table-wrap">
              <table class="task-table" id="recentTaskTable">
                <thead>
                  <tr>
                    <th>Task ID</th>
                    <th>Title</th>
                    <th>Dept</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Due</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          
          <!-- Right: Live Activity Timeline -->
          <div class="panel glass-panel">
            <div class="panel-header">
              <h3>Resort Activity Stream</h3>
            </div>
            <div class="activity-stream" id="activityStream">
              <!-- populated by app.js -->
            </div>
          </div>
        </div>
      </section>

      <!-- ---- Tasks view ---- -->
      <section id="view-tasks" class="view hidden">
        <header class="view-header">
          <div>
            <p class="eyebrow">All Tasks</p>
            <h1 class="page-title">Task Control Center</h1>
          </div>
          
          <div class="view-toggle">
            <button class="toggle-btn active" id="btnListView">List View</button>
            <button class="toggle-btn" id="btnKanbanView">Kanban Board</button>
          </div>
        </header>

        <div class="filters-header">
          <div class="filters">
            <select id="filterDept">
              <option value="">All Departments</option>
            </select>
            <select id="filterStatus">
              <option value="">All Statuses</option>
              <option>Pending</option>
              <option>Accepted</option>
              <option>In Progress</option>
              <option>On Hold</option>
              <option>Completed</option>
              <option>Rejected</option>
            </select>
            <select id="filterPriority">
              <option value="">All Priorities</option>
              <option>Critical</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </div>
        </div>

        <!-- List View Container -->
        <div id="listViewContainer" class="table-wrap panel glass-panel">
          <table class="task-table" id="fullTaskTable">
            <thead>
              <tr>
                <th>Task ID</th>
                <th>Title</th>
                <th>Creator Dept</th>
                <th>Assigned Dept</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Due</th>
                <th>Quick Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Kanban View Container -->
        <div id="kanbanViewContainer" class="kanban-board hidden">
          <!-- Populated by app.js -->
          <div class="kanban-column" data-status="Pending">
            <div class="kanban-column-header">
              <span class="kanban-column-title"><span class="kanban-column-dot dot-Pending"></span>Pending</span>
              <span class="kanban-column-count" id="count-Pending">0</span>
            </div>
            <div class="kanban-cards-container" id="cards-Pending"></div>
          </div>
          <div class="kanban-column" data-status="Accepted">
            <div class="kanban-column-header">
              <span class="kanban-column-title"><span class="kanban-column-dot dot-Accepted"></span>Accepted</span>
              <span class="kanban-column-count" id="count-Accepted">0</span>
            </div>
            <div class="kanban-cards-container" id="cards-Accepted"></div>
          </div>
          <div class="kanban-column" data-status="In Progress">
            <div class="kanban-column-header">
              <span class="kanban-column-title"><span class="kanban-column-dot dot-InProgress"></span>In Progress</span>
              <span class="kanban-column-count" id="count-InProgress">0</span>
            </div>
            <div class="kanban-cards-container" id="cards-InProgress"></div>
          </div>
          <div class="kanban-column" data-status="On Hold">
            <div class="kanban-column-header">
              <span class="kanban-column-title"><span class="kanban-column-dot dot-OnHold"></span>On Hold</span>
              <span class="kanban-column-count" id="count-OnHold">0</span>
            </div>
            <div class="kanban-cards-container" id="cards-OnHold"></div>
          </div>
          <div class="kanban-column" data-status="Completed">
            <div class="kanban-column-header">
              <span class="kanban-column-title"><span class="kanban-column-dot dot-Completed"></span>Completed</span>
              <span class="kanban-column-count" id="count-Completed">0</span>
            </div>
            <div class="kanban-cards-container" id="cards-Completed"></div>
          </div>
        </div>
      </section>

      <!-- ---- Departments view ---- -->
      <section id="view-departments" class="view hidden">
        <header class="view-header">
          <div>
            <p class="eyebrow">Structure</p>
            <h1 class="page-title">Departments Overview</h1>
          </div>
        </header>
        <div class="dept-grid" id="deptGrid"><!-- populated by app.js --></div>
      </section>

      <!-- ---- User Management view (Admin Only) ---- -->
      <section id="view-users" class="view hidden">
        <header class="view-header">
          <div>
            <p class="eyebrow">Administration</p>
            <h1 class="page-title">User Management</h1>
          </div>
        </header>

        <div class="dashboard-layout">
          <!-- Left: Users list table -->
          <div class="panel glass-panel">
            <div class="panel-header">
              <h3>Registered Users</h3>
            </div>
            <div class="table-wrap">
              <table class="task-table" id="usersTable">
                <thead>
                  <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Department</th>
                    <th>Created At</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Populated dynamically -->
                </tbody>
              </table>
            </div>
          </div>
          
          <!-- Right: Register user form -->
          <div class="panel glass-panel" style="padding: 24px;">
            <div class="panel-header" style="padding: 0 0 16px; margin-bottom: 20px;">
              <h3>Register New User</h3>
            </div>
            <form id="registerUserForm">
              <div style="margin-bottom: 16px;">
                <label class="field-label" for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="e.g. bhavik" required pattern="^[a-zA-Z0-9_]{3,15}$" title="3-15 alphanumeric characters or underscore">
              </div>
              
              <div style="margin-bottom: 16px;">
                <label class="field-label" for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
              </div>
              
              <div style="margin-bottom: 16px;">
                <label class="field-label" for="regRole">Role</label>
                <select id="regRole" required>
                  <option value="staff">Staff Member</option>
                  <option value="head">Department Head</option>
                  <option value="admin">Super Admin</option>
                </select>
              </div>
              
              <div style="margin-bottom: 20px;">
                <label class="field-label" for="regDept">Department</label>
                <select id="regDept" required>
                  <!-- populated by app.js -->
                </select>
              </div>
              
              <button type="submit" class="btn btn-gold btn-block">
                <i data-lucide="user-plus"></i> Register User
              </button>
            </form>
          </div>
        </div>
      </section>

    </main>

    <!-- Mobile Floating Bottom Navigation Bar -->
    <nav class="mobile-bottom-nav">
      <button class="nav-item active" data-view="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="tasks">
        <i data-lucide="check-square"></i>
        <span>Tasks</span>
      </button>
      <button class="nav-item" data-view="departments">
        <i data-lucide="layers"></i>
        <span>Depts</span>
      </button>
      <button class="nav-item admin-only hidden" data-view="users" id="mobileNavUsersBtn">
        <i data-lucide="users"></i>
        <span>Users</span>
      </button>
      <button class="mobile-nav-item-btn" id="mobileNewTaskBtn">
        <i data-lucide="plus-circle" style="color:var(--gold); stroke-width: 2.5px;"></i>
        <span>New Task</span>
      </button>
    </nav>
  </div>

  <!-- ============ NEW TASK MODAL ============ -->
  <div id="taskModal" class="modal-backdrop hidden">
    <div class="modal glass-panel">
      <div class="modal-header">
        <h3>Assign Operations Task</h3>
        <button class="icon-btn" id="closeModal">&times;</button>
      </div>
      <form id="taskForm">
        <label class="field-label" for="taskTitle">Task Title</label>
        <input type="text" id="taskTitle" placeholder="e.g. Broken AC in room, room service delay..." required>

        <label class="field-label" for="taskDesc">Detailed Description</label>
        <textarea id="taskDesc" rows="3" placeholder="Provide operational details for the assigned team..."></textarea>

        <div class="field-row">
          <div>
            <label class="field-label" for="taskDept">Assign To Department</label>
            <select id="taskDept" required></select>
          </div>
          <div>
            <label class="field-label" for="taskPriority">Priority Level</label>
            <select id="taskPriority">
              <option>Low</option>
              <option>Medium</option>
              <option selected>High</option>
              <option>Critical</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div>
            <label class="field-label" for="taskDue">Due Date & Time</label>
            <input type="datetime-local" id="taskDue" required>
          </div>
          <div>
            <label class="field-label" for="taskRoom">Room / Area (optional)</label>
            <input type="text" id="taskRoom" placeholder="e.g. 305, Lobby, Poolside">
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="taskGuestRelated">
          <span style="font-size: 13px; color: var(--text-primary); font-weight: 500;">Guest-related critical issue</span>
        </label>

        <button type="submit" class="btn btn-gold btn-block">
          <i data-lucide="send"></i> Dispatch Task
        </button>
      </form>
    </div>
  </div>

  <!-- ============ TASK DETAILS DRAWER (ADVANCED SIDE PANEL) ============ -->
  <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>
  <aside id="taskDetailDrawer" class="details-drawer">
    <div class="drawer-header">
      <h3 id="drawerTaskId">DBR-2026-00000</h3>
      <button class="icon-btn" id="closeDrawerBtn">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <span class="eyebrow" id="drawerTaskGuestTag">STANDARD ISSUE</span>
        <h2 class="drawer-title" id="drawerTaskTitle">Task Title Here</h2>
        <div id="drawerStatusBadge">Pending</div>
      </div>

      <div class="drawer-meta-grid">
        <div class="drawer-meta-item">
          <span class="drawer-meta-label">Assigned Dept</span>
          <span class="drawer-meta-value" id="drawerAssignedDept">—</span>
        </div>
        <div class="drawer-meta-item">
          <span class="drawer-meta-label">Priority</span>
          <span class="drawer-meta-value" id="drawerPriority">—</span>
        </div>
        <div class="drawer-meta-item">
          <span class="drawer-meta-label">Location / Room</span>
          <span class="drawer-meta-value" id="drawerRoom">—</span>
        </div>
        <div class="drawer-meta-item">
          <span class="drawer-meta-label">Due Date</span>
          <span class="drawer-meta-value" id="drawerDueDate">—</span>
        </div>
      </div>

      <div class="drawer-section">
        <span class="drawer-section-title">Description</span>
        <p id="drawerDesc" style="font-size: 13.5px; line-height: 1.5; color: var(--text-secondary);">No description provided.</p>
      </div>

      <div class="drawer-section">
        <span class="drawer-section-title">Timeline & Logs</span>
        <div class="drawer-timeline" id="drawerTimeline">
          <div class="drawer-timeline-item">Task created by system. (10:00 PM)</div>
        </div>
      </div>

      <div class="drawer-section">
        <span class="drawer-section-title">Staff Comments</span>
        <div class="drawer-timeline" id="drawerComments">
          <!-- Comments go here -->
        </div>
        <div class="comment-input-area">
          <textarea id="commentText" placeholder="Add status notes or updates..."></textarea>
          <button class="btn btn-gold btn-block" id="addCommentBtn" style="padding: 8px 12px; font-size:12.5px;">Add Comment</button>
        </div>
      </div>
    </div>
  </aside>
  </template>

  <!-- Container for the authenticated App Shell -->
  <div id="appContainer"></div>


  <div id="toast" class="toast hidden"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
